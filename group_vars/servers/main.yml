---
nginx_server_name: hexlet.mooo.com
certbot_email: admin@hexlet.mooo.com

# Порты мониторинга (см. inventory.ini).
app_port: 8080
app_management_port: 9090
node_exporter_port: 9100

# Reverse proxy для Actuator: /actuator/health и /actuator/prometheus.
nginx_management_enabled: true
nginx_management_basic_auth_enabled: true
nginx_management_basic_auth_user: metrics
nginx_management_basic_auth_password: "{{ vault_nginx_management_basic_auth_password | default('') }}"

app_image: ghcr.io/rfvbkm/project-devops-deploy
app_image_tag: latest

app_registry_username: "{{ vault_docker_registry_username | default('') }}"
app_registry_password: "{{ vault_docker_registry_password | default('') }}"

app_container_env:
  SPRING_PROFILES_ACTIVE: "{{ app_spring_profile }}"
  JAVA_OPTS: "{{ app_java_opts }}"
  MANAGEMENT_SERVER_PORT: "{{ app_management_port | string }}"
  SPRING_DATASOURCE_URL: "{{ vault_spring_datasource_url }}"
  SPRING_DATASOURCE_USERNAME: "{{ vault_spring_datasource_username }}"
  SPRING_DATASOURCE_PASSWORD: "{{ vault_spring_datasource_password }}"
  STORAGE_S3_BUCKET: "{{ vault_storage_s3_bucket | default('') }}"
  STORAGE_S3_REGION: "{{ vault_storage_s3_region | default('') }}"
  STORAGE_S3_ENDPOINT: "{{ vault_storage_s3_endpoint | default('') }}"
  STORAGE_S3_ACCESSKEY: "{{ vault_storage_s3_access_key | default('') }}"
  STORAGE_S3_SECRETKEY: "{{ vault_storage_s3_secret_key | default('') }}"
  STORAGE_S3_CDNURL: "{{ vault_storage_s3_cdn_url | default('') }}"
