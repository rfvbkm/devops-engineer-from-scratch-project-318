[servers]
app ansible_host=176.53.174.158 ansible_user=user

[monitoring]
prometheus ansible_host=<monitoring-host> ansible_user=user

[servers:vars]
ansible_python_interpreter=/usr/bin/python3

[monitoring:vars]
ansible_python_interpreter=/usr/bin/python3

# Порты сервера приложения (group_vars/servers/main.yml):
#   8080  — HTTP приложения (основной)
#   9090  — Spring Boot Actuator (management): /actuator/health, /actuator/prometheus
#   9100  — Node Exporter: /metrics
#   80/443 — Nginx reverse proxy (в т.ч. /actuator/* с basic auth)
# Basic auth для management через Nginx: user=metrics, password в vault.yml
#
# Порты сервера мониторинга (group_vars/monitoring/main.yml):
#   9090  — Prometheus UI: /graph, /targets, /api/v1/query
#   22    — SSH (администрирование)
