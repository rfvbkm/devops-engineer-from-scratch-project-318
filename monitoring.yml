---
- name: Prepare monitoring server for Prometheus
  hosts: monitoring
  become: true
  vars:
    docker_user: "{{ ansible_user | default('user') }}"
    docker_packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    auxiliary_packages:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - apt-transport-https
      - software-properties-common
      - ufw
    allowed_ports:
      - { port: "22", proto: tcp, comment: "SSH" }
      - { port: "{{ prometheus_port | default(9090) }}", proto: tcp, comment: "Prometheus" }

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install auxiliary packages
      ansible.builtin.apt:
        name: "{{ auxiliary_packages }}"
        state: present

    - name: Ensure /etc/apt/keyrings exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/gpg"
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        force: false

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}
          signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}
          {{ ansible_facts['distribution_release'] }} stable
        filename: docker
        state: present

    - name: Install Docker Engine and docker-compose plugin
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: true

    - name: Ensure Docker service is enabled and running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add deployment user to docker group
      ansible.builtin.user:
        name: "{{ docker_user }}"
        groups: docker
        append: true

    - name: Install pip for Docker SDK
      ansible.builtin.apt:
        name: python3-pip
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Install Docker SDK for Python
      ansible.builtin.pip:
        name:
          - "docker>=7.1.0"
          - requests-unixsocket
        state: present
        extra_args: --break-system-packages

    - name: Set UFW default incoming policy to deny
      community.general.ufw:
        direction: incoming
        policy: deny

    - name: Set UFW default outgoing policy to allow
      community.general.ufw:
        direction: outgoing
        policy: allow

    - name: Allow required TCP ports through UFW
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: "{{ item.proto }}"
        comment: "{{ item.comment }}"
      loop: "{{ allowed_ports }}"

    - name: Enable UFW
      community.general.ufw:
        state: enabled

  roles:
    - prometheus
