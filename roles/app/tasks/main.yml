---
- name: Validate required secrets are defined
  ansible.builtin.assert:
    that:
      - vault_spring_datasource_url is defined
      - vault_spring_datasource_url | length > 0
      - vault_spring_datasource_username is defined
      - vault_spring_datasource_password is defined
    fail_msg: >-
      Создайте и зашифруйте group_vars/servers/vault.yml
      (см. group_vars/servers/vault.yml.example).

- name: Ensure application directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ app_dir_owner }}"
    group: "{{ app_dir_group }}"
    mode: "{{ app_dir_mode }}"
  loop:
    - "{{ app_base_dir }}"
    - "{{ app_data_dir }}"
    - "{{ app_log_dir }}"
    - "{{ app_images_dir }}"

- name: Read currently deployed image tag
  ansible.builtin.slurp:
    src: "{{ app_base_dir }}/.current_tag"
  register: app_current_tag_file
  failed_when: false

- name: Remember previous image tag for rollback
  ansible.builtin.copy:
    dest: "{{ app_base_dir }}/.previous_tag"
    content: "{{ app_current_tag_file.content | b64decode | trim }}\n"
    owner: "{{ app_dir_owner }}"
    group: "{{ app_dir_group }}"
    mode: "0644"
  when:
    - app_current_tag_file.content is defined
    - (app_current_tag_file.content | b64decode | trim) != (app_image_tag | string)

- name: Log in to container registry
  community.docker.docker_login:
    registry_url: "{{ app_registry_url }}"
    username: "{{ app_registry_username }}"
    password: "{{ app_registry_password }}"
    docker_host: "{{ app_docker_host }}"
  no_log: true
  when: app_registry_username | length > 0

- name: Pull application image
  community.docker.docker_image:
    name: "{{ app_image }}:{{ app_image_tag }}"
    source: pull
    force_source: true
    docker_host: "{{ app_docker_host }}"

- name: Run application container
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    image: "{{ app_image }}:{{ app_image_tag }}"
    state: started
    restart_policy: unless-stopped
    pull: never
    docker_host: "{{ app_docker_host }}"
    network_mode: "{{ app_network_mode }}"
    env: "{{ app_container_env }}"
    volumes: "{{ app_container_volumes }}"
    comparisons:
      image: strict
      env: strict
      volumes: strict
  register: app_container

- name: Record deployed image tag
  ansible.builtin.copy:
    dest: "{{ app_base_dir }}/.current_tag"
    content: "{{ app_image_tag }}\n"
    owner: "{{ app_dir_owner }}"
    group: "{{ app_dir_group }}"
    mode: "0644"

- name: Wait for application readiness
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ app_management_port }}/actuator/health/readiness"
    status_code: 200
  register: app_health_check
  until: app_health_check.status == 200
  retries: "{{ app_healthcheck_retries }}"
  delay: "{{ app_healthcheck_delay }}"
