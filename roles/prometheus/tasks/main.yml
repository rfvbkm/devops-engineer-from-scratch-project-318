---
- name: Ensure Prometheus directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ prometheus_base_dir }}"
    - "{{ prometheus_config_dir }}"
    - "{{ prometheus_data_dir }}"
    - "{{ prometheus_rules_dir }}"

- name: Deploy alert rules
  ansible.builtin.copy:
    src: alerts.yml
    dest: "{{ prometheus_rules_dir }}/alerts.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart prometheus

- name: Render Prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_config_dir }}/prometheus.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart prometheus

- name: Ensure monitoring Docker network exists
  community.docker.docker_network:
    name: "{{ prometheus_docker_network }}"
    state: present
    driver: bridge
    docker_host: "{{ prometheus_docker_host }}"

- name: Pull Prometheus image
  community.docker.docker_image:
    name: "{{ prometheus_image }}:{{ prometheus_image_tag }}"
    source: pull
    docker_host: "{{ prometheus_docker_host }}"

- name: Run Prometheus container
  community.docker.docker_container:
    name: "{{ prometheus_container_name }}"
    image: "{{ prometheus_image }}:{{ prometheus_image_tag }}"
    state: started
    restart_policy: unless-stopped
    pull: never
    docker_host: "{{ prometheus_docker_host }}"
    networks:
      - name: "{{ prometheus_docker_network }}"
    published_ports:
      - "{{ prometheus_port }}:9090"
    volumes:
      - "{{ prometheus_config_dir }}/prometheus.yml:/etc/prometheus/prometheus.yml:ro"
      - "{{ prometheus_rules_dir }}:/etc/prometheus/rules:ro"
      - "{{ prometheus_data_dir }}:/prometheus"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--storage.tsdb.retention.time={{ prometheus_retention_time }}"
    comparisons:
      image: strict
      env: strict
      volumes: strict
      command: strict
      published_ports: strict
      networks: strict

- name: Wait for Prometheus API
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ prometheus_port }}/-/ready"
    status_code: 200
  register: prometheus_ready
  until: prometheus_ready.status == 200
  retries: 12
  delay: 5
